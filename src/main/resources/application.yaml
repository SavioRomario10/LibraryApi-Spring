spring:
  application:
    name: LibraryApi
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  output:
    ansi:
      enabled: ALWAYS
  datasource: 
    url: ${DS_URL:jdbc:postgresql://localhost:5432/library}
    username: ${DS_USERNAME:postgres}
    password: ${DS_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
logging:
  pattern:
    console: '%clr(%d{dd-MM-yyyy HH:mm:ss}){faint} %clr(%5p) %clr([%t]){faint} %clr(%-40.40logger){cyan} %clr(:){yellow} %m%n'
  file:
    name: library-api.log
  level:
    root: warn
    org:
      springframework:
        web: info
    io:
      github:
        SavioRomario10: trace
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: '*'
springdoc:
  override-with-generic-response: false

# profile: production
---
spring:
  config:
    activate:
      on-profile: production
  jpa:
    show-sql: false